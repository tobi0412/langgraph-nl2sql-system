services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-nl2sql-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dvdrental
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-nl2sql-streamlit
    command:
      [
        "streamlit",
        "run",
        "streamlit_app/app.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
        "--server.headless",
        "true",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dvdrental
      # Healthcheck del API FastAPI (sidebar); el Schema Agent no depende del contenedor app
      - API_BASE_URL=http://app:8000
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    # La imagen define HEALTHCHECK contra :8000 (uvicorn); aqui lo sobreescribimos para :8501
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8501/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    working_dir: /app

  postgres:
    image: postgres:16-alpine
    container_name: langgraph-nl2sql-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dvdrental
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/bootstrap_minimal_dvdrental.sql:/docker-entrypoint-initdb.d/001_bootstrap.sql:ro
      - ./scripts/sql/readonly_guardrail.sql:/docker-entrypoint-initdb.d/002_readonly_guardrail.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dvdrental"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
